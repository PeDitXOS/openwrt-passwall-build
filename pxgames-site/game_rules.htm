<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXgames - Game Rules</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header .subtitle {
            opacity: 0.6;
            font-size: 14px;
        }
        .update-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .update-bar .info {
            font-size: 13px;
            opacity: 0.7;
        }
        .update-bar .info span {
            color: #60a5fa;
            font-weight: 600;
        }
        .btn-update {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(59,130,246,0.4);
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .game-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        .game-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .game-card .name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .game-card .version {
            font-size: 12px;
            color: #60a5fa;
            margin-bottom: 12px;
        }
        .game-card .meta {
            font-size: 12px;
            opacity: 0.5;
        }
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            opacity: 0.4;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 PXgames</h1>
            <div class="subtitle">Game Rules for PXgames Proxy</div>
        </div>

        <div class="update-bar">
            <div class="info">
                Version: <span id="version">-</span> |
                Updated: <span id="updated">-</span> |
                Rules: <span id="rule-count">0</span>
            </div>
            <button class="btn-update" onclick="location.reload()">🔄 Refresh</button>
        </div>

        <div class="game-grid" id="game-grid">
            <!-- Populated by JS -->
        </div>

        <div class="footer">
            PXgames Game Rules © 2026
        </div>
    </div>

    <script>
        // This template is fetched by PXgames app and rendered in LuCI
        // The actual rule data is in rules.json
        document.getElementById('version').textContent = '1.0';
        document.getElementById('updated').textContent = new Date().toLocaleDateString();
    </script>
</body>
</html>
