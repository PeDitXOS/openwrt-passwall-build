name: Verify Keys

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check APK_PRIVATE_KEY fingerprint
        run: |
          echo "${{ secrets.APK_PRIVATE_KEY }}" | openssl pkey -in /dev/stdin -outform PEM 2>/dev/null | openssl md5 || echo "NOT_A_PEM_KEY"
          echo "${{ secrets.APK_PRIVATE_KEY }}" | openssl pkey -in /dev/stdin -outform PEM 2>/dev/null | openssl sha256 || echo "NOT_A_PEM_KEY"

      - name: Check SIGN_PRIV_KEY fingerprint
        run: |
          echo "${{ secrets.SIGN_PRIV_KEY }}" | openssl pkey -in /dev/stdin -outform PEM 2>/dev/null | openssl md5 || echo "NOT_A_PEM_KEY"
          echo "${{ secrets.SIGN_PRIV_KEY }}" | openssl pkey -in /dev/stdin -outform PEM 2>/dev/null | openssl sha256 || echo "NOT_A_PEM_KEY"

      - name: Check PAT validity
        run: |
          curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.PAT }}" https://api.github.com/user
