name: Build
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Debug Startup
        run: |
          echo "Runner is alive"
          node -v || echo "node not found yet"

      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          
      - uses: dtolnay/rust-toolchain@stable
      # rust-cache暂时注释 - 可能导致silent hang
      # - uses: Swatinem/rust-cache@v2
      
      - uses: FedericoCarboni/setup-ffmpeg@v3
      
      - run: npm ci
      - run: npm run build
      
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v${{ github.run_number }}
          releaseName: 'UberEditor Windows Build ${{ github.run_number }}'
          releaseBody: 'Automated Windows build'
          releaseDraft: true
          prerelease: false
